<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" disabled>
        <div class="buttons">
            <button class="color-1" onclick="appendValue('7')">7</button>
            <button class="color-1" onclick="appendValue('8')">8</button>
            <button class="color-1" onclick="appendValue('9')">9</button>
            <button class="color-2" onclick="appendValue('%')">%</button>
            <button class="color-2" onclick="clearAll()">CE</button>
            <button class="color-1" onclick="appendValue('4')">4</button>
            <button class="color-1" onclick="appendValue('5')">5</button>
            <button class="color-1" onclick="appendValue('6')">6</button>
            <button class="color-2" onclick="appendValue('*')">*</button>
            <button class="color-2" onclick="appendValue('/')">/</button>
            <button class="color-1" onclick="appendValue('1')">1</button>
            <button class="color-1" onclick="appendValue('2')">2</button>
            <button class="color-1" onclick="appendValue('3')">3</button>
            <button class="color-2" onclick="appendValue('+')">+</button>
            <button class="color-2" onclick="appendValue('-')">-</button>
            <button class="color-1" onclick="appendValue('0')">0</button>
            <button class="color-1" onclick="appendValue('.')">.</button>
            <button class="color-1" onclick="appendValue('+ or -')">=/-</button>
            <button class="color-2" onclick="backspace()">C</button>
            <button class="color-2" onclick="total()">=</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
